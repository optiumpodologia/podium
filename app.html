<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6D5BD0">
<title>Podología</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon" id="sidebar-logo-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/><path d="M16 17h4"/><path d="M4 13h4"/></svg></div>
    <div class="sidebar-logo-text" id="sidebar-logo-text">Podología</div>
  </div>

  <nav class="sidebar-nav" id="nav">
  </nav>

  <div class="sidebar-user">
    <div class="user-avatar" id="user-avatar">--</div>
    <div class="user-info">
      <div class="user-name" id="user-name">...</div>
      <div class="user-role" id="user-role">...</div>
    </div>
    <button class="btn-logout" onclick="cerrarSesion()" title="Cerrar sesión"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg></button>
  </div>
</aside>

<main class="main" id="main" style="grid-column:2;grid-row:1;">
  <div class="vacio">
    <svg width="34" height="34" viewBox="0 0 50 50" style="margin-bottom:0.5rem" aria-label="Cargando">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#E6E3F7" stroke-width="5"/>
      <circle cx="25" cy="25" r="20" fill="none" stroke="#6D5BD0" stroke-width="5" stroke-linecap="round" stroke-dasharray="90 150">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="0.9s" repeatCount="indefinite"/>
      </circle>
    </svg>
    Cargando...
  </div>
</main>

<!-- Contenedor PERSISTENTE de la agenda. Se monta una sola vez y queda vivo
     (oculto, no destruido) al navegar a otras secciones: así la info del día
     no se vuelve a traer ni recalcular cada vez que se vuelve a la agenda.
     Ocupa la misma celda del grid que #main; se alternan por display. -->
<div class="main" id="agenda-mount" style="grid-column:2;grid-row:1;display:none;"></div>

</div>

<div id="modal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.15/dist/face-api.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/foto.js"></script>
<script src="js/permisos.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/agenda.js"></script>
<script src="js/pacientes.js"></script>
<script src="js/turnos.js"></script>
<script src="js/profesionales.js"></script>
<script src="js/tipos_atencion.js"></script>
<script src="js/productos.js"></script>
<script src="js/ficha_paciente.js"></script>
<script src="js/cobro.js"></script>
<script src="js/liquidaciones.js"></script>
<script src="js/configuracion.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/negocios.js"></script>
<script src="js/planes.js"></script>
<script src="js/consultorios.js"></script>
<script src="js/admin.js"></script>
<script>
let usuarioActual = null;

// Clave donde recordamos en qué módulo estaba el usuario, para que al
// refrescar (F5) vuelva a la misma pantalla en vez de ir siempre a Inicio.
const MODULO_KEY = 'podium_modulo_activo';

// Iconos de línea (estilo Lucide), embebidos como SVG. Heredan el color del
// ítem (gris normal, violeta cuando está activo) vía stroke="currentColor".
const svgIcon = (paths) =>
  `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle">${paths}</svg>`;

const ICONS = {
  negocios:       svgIcon('<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>'),
  planes:         svgIcon('<path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/>'),
  dashboard:      svgIcon('<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>'),
  agenda:         svgIcon('<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>'),
  pacientes:      svgIcon('<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),
  consultorios:   svgIcon('<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>'),
  profesionales:  svgIcon('<path d="M16 18a4 4 0 0 0-8 0"/><circle cx="12" cy="11" r="3"/><rect width="18" height="18" x="3" y="3" rx="2"/>'),
  tipos_atencion: svgIcon('<path d="M11 2v2"/><path d="M5 2v2"/><path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"/><path d="M8 15a6 6 0 0 0 6 6 4 4 0 0 0 4-4 2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><circle cx="20" cy="10" r="2"/>'),
  productos:      svgIcon('<path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>'),
  usuarios:       svgIcon('<path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/>'),
  configuracion:  svgIcon('<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'),
  admin_inicio:   svgIcon('<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>'),
  consumo_emails: svgIcon('<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>'),
  suscripciones:  svgIcon('<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>'),
  estadisticas:   svgIcon('<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>'),
  salud:          svgIcon('<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>'),
  notas:          svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/>'),
  liquidaciones:  svgIcon('<rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01"/><path d="M18 12h.01"/>')
};

// Catálogo ÚNICO de módulos (id, etiqueta, ícono, función que lo dibuja).
// Quién ve cada uno lo decide permisos.js (MODULOS_ACCESO), no este archivo.
// El orden de acá es el orden en que aparecen en el menú.
const MODULOS = [
  { id: 'admin_inicio',   label: 'Inicio',           icon: ICONS.admin_inicio,   render: renderAdminInicio },
  { id: 'negocios',       label: 'Negocios',         icon: ICONS.negocios,       render: renderNegocios },
  { id: 'consumo_emails', label: 'Consumo de emails',icon: ICONS.consumo_emails, render: renderConsumoEmails },
  { id: 'suscripciones',  label: 'Suscripciones',    icon: ICONS.suscripciones,  render: renderSuscripciones },
  { id: 'planes',         label: 'Planes',           icon: ICONS.planes,         render: renderPlanes },
  { id: 'estadisticas',   label: 'Estadísticas',     icon: ICONS.estadisticas,   render: renderEstadisticas },
  { id: 'salud',          label: 'Salud del sistema',icon: ICONS.salud,          render: renderSaludSistema },
  { id: 'notas',          label: 'Notas / soporte',  icon: ICONS.notas,          render: renderNotasSoporte },
  { id: 'dashboard',      label: 'Inicio',          icon: ICONS.dashboard,      render: renderDashboard },
  { id: 'agenda',         label: 'Agenda',          icon: ICONS.agenda,         render: renderAgenda },
  { id: 'pacientes',      label: 'Pacientes',       icon: ICONS.pacientes,      render: renderPacientes },
  { id: 'consultorios',   label: 'Consultorios',    icon: ICONS.consultorios,   render: renderConsultorios },
  { id: 'profesionales',  label: 'Mi equipo',       icon: ICONS.profesionales,  render: renderProfesionales },
  { id: 'tipos_atencion', label: 'Atenciones',      icon: ICONS.tipos_atencion, render: renderTiposAtencion },
  { id: 'productos',      label: 'Productos',        icon: ICONS.productos,      render: renderProductos },
  { id: 'liquidaciones',  label: 'Comisiones',       icon: ICONS.liquidaciones,  render: renderLiquidaciones },
  { id: 'configuracion',  label: 'Configuración',    icon: ICONS.configuracion,  render: renderConfiguracion }
];

(async () => {
  usuarioActual = await protegerPagina();
  if (!usuarioActual) return;

  // Si es profesional, sabemos si tiene la comisión habilitada (define si ve "Comisiones").
  if (usuarioActual.rol === 'profesional') {
    const { data: _prof } = await sb.from('profesionales')
      .select('comision_habilitada').eq('usuario_id', usuarioActual.id).maybeSingle();
    usuarioActual.comision_habilitada = _prof ? _prof.comision_habilitada !== false : true;
  }

  document.getElementById('user-name').textContent = usuarioActual.nombre;
  document.getElementById('user-role').textContent =
    usuarioActual.rol === 'super_admin' ? 'Super Admin' :
    usuarioActual.rol === 'negocio' ? 'Negocio' :
    usuarioActual.rol === 'recepcion' ? 'Recepción' : 'Profesional';

  // Avatar abajo-izq (NO clickeable en ningún rol).
  // Por defecto, ícono genérico de usuario. Solo el profesional con foto
  // cargada muestra su foto. Recepción/negocio/super_admin → ícono.
  const av = document.getElementById('user-avatar');
  if (usuarioActual.rol === 'profesional') {
    // El profesional ya ve su foto en el saludo de la agenda; abajo dejamos solo nombre + rol.
    av.style.display = 'none';
  } else {
    av.textContent = '';
    av.style.padding = '0';
    av.style.overflow = 'hidden';
    av.innerHTML = svgIcon('<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>');
  }

  // Logo + nombre del negocio arriba a la izquierda (mismos para todos los
  // usuarios del negocio). El super_admin no tiene negocio: queda el default.
  if (usuarioActual.negocio_id) {
    const { data: cfg } = await sb.from('configuracion')
      .select('nombre_consultorio, logo_url')
      .eq('negocio_id', usuarioActual.negocio_id)
      .maybeSingle();
    if (cfg) {
      if (cfg.nombre_consultorio) {
        document.getElementById('sidebar-logo-text').textContent = cfg.nombre_consultorio;
        document.title = cfg.nombre_consultorio;
      }
      if (cfg.logo_url) {
        const ic = document.getElementById('sidebar-logo-icon');
        ic.innerHTML = `<img src="${cfg.logo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;">`;
      }
    }
  }

  renderNav();

  // Aterriza en el módulo guardado (si el usuario todavía puede verlo);
  // si no hay guardado o ya no aplica, en el primero permitido.
  const guardado = localStorage.getItem(MODULO_KEY);
  const moduloInicial = (guardado && puedeVerModulo(usuarioActual, guardado))
    ? guardado
    : (MODULOS.find(m => puedeVerModulo(usuarioActual, m.id))?.id || 'dashboard');
  navegar(moduloInicial);
})();

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = MODULOS
    .filter(m => puedeVerModulo(usuarioActual, m.id))
    .map(m => `
      <button class="nav-item" data-modulo="${m.id}" onclick="navegar('${m.id}')">
        <span class="nav-item-icon">${m.icon}</span>
        <span>${m.label}</span>
      </button>
    `).join('');
}

function navegar(moduloId) {
  if (!puedeVerModulo(usuarioActual, moduloId)) {
    const am = document.getElementById('agenda-mount');
    if (am) am.style.display = 'none';
    const mn = document.getElementById('main');
    mn.style.display = '';
    mn.innerHTML = '<div class="vacio">No tenés acceso a este módulo</div>';
    return;
  }

  // Recordamos el módulo para sobrevivir un F5.
  try { localStorage.setItem(MODULO_KEY, moduloId); } catch (e) {}

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.modulo === moduloId);
  });

  const main = document.getElementById('main');
  const agendaMount = document.getElementById('agenda-mount');

  if (moduloId === 'agenda') {
    // Agenda PERSISTENTE: se monta una sola vez; al volver, solo se muestra.
    main.style.display = 'none';
    agendaMount.style.display = '';
    if (!agendaMount.dataset.montada) {
      agendaMount.dataset.montada = '1';
      renderAgenda(agendaMount);
    } else if (typeof reentrarAgenda === 'function') {
      reentrarAgenda();   // reanuda poll si hizo falta y refresca si cambió el día
    }
    return;
  }

  // Otras secciones: la agenda queda oculta (viva), se muestra #main.
  agendaMount.style.display = 'none';
  main.style.display = '';

  const modulo = MODULOS.find(m => m.id === moduloId);
  if (modulo && typeof modulo.render === 'function') {
    modulo.render(main);
  } else {
    main.innerHTML = '<div class="vacio">Módulo no disponible</div>';
  }
}

// Modal helpers globales
//
// El modal NO se cierra al tocar fuera de la ventana, a propósito: así no
// se pierde lo que estás cargando/editando por un toque al costado (pasa
// fácil en el celular). Se cierra solo con la × del encabezado o con el
// botón Cancelar/Cerrar de cada formulario.
function abrirModal(html) {
  const cont = document.getElementById('modal-container');
  cont.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">${html}</div>
    </div>
  `;
}

function cerrarModal() {
  document.getElementById('modal-container').innerHTML = '';
}
</script>
</body>
</html>
