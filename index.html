<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#534AB7">
<title>Podología - Iniciar sesión</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">⚕</div>
    <h1>Sistema de Podología</h1>
    <p>Iniciá sesión para continuar</p>

    <div id="error-msg" class="error-msg" style="display:none;"></div>

    <form id="form-login">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" autofocus>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-primary" id="btn-entrar">Entrar</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script>
(async () => {
  // Si ya hay sesión activa, redirigir a la app
  if (await estaLogueado()) {
    window.location.href = 'app.html';
    return;
  }
})();

const form = document.getElementById('form-login');
const errorMsg = document.getElementById('error-msg');
const btnEntrar = document.getElementById('btn-entrar');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  btnEntrar.disabled = true;
  btnEntrar.textContent = 'Ingresando...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorMsg.textContent = 'Email o contraseña incorrectos';
    errorMsg.style.display = 'block';
    btnEntrar.disabled = false;
    btnEntrar.textContent = 'Entrar';
    return;
  }

  window.location.href = 'app.html';
});
</script>
</body>
</html>
