<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6D5BD0">
<title>Podium · Iniciar sesión</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  :root{
    --pl-primario:#6D5BD0;
    --pl-primario-oscuro:#5d4cc0;
    --pl-texto:#2b2b3a;
    --pl-texto-2:#8a8f9c;
    --pl-borde:#e6e3f2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:22px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#f5f3fc 0%,#eafaf1 100%);
    color:var(--pl-texto);
  }
  .pl-card{
    width:100%;max-width:400px;background:#fff;border:1px solid #efedf7;
    border-radius:20px;padding:40px 34px 30px;text-align:center;
    box-shadow:0 20px 55px -22px rgba(60,50,110,.35);
  }
  .pl-logo{width:150px;max-width:70%;height:auto;display:block;margin:0 auto 6px;}
  .pl-logo-txt{font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--pl-texto);margin-bottom:6px;}
  .pl-tag{font-size:14px;color:var(--pl-texto-2);margin:0 0 26px;}
  .pl-error{
    display:none;background:#fdeaea;border:1px solid #f6c6c6;color:#c0392b;
    padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:left;
  }
  .pl-field{text-align:left;margin-bottom:15px;}
  .pl-field label{display:block;font-size:13px;font-weight:600;color:var(--pl-texto-2);margin-bottom:6px;}
  .pl-field input{
    width:100%;padding:12px 14px;border:1px solid var(--pl-borde);border-radius:11px;
    font-size:15px;outline:none;background:#fff;transition:border-color .12s,box-shadow .12s;
  }
  .pl-field input:focus{border-color:var(--pl-primario);box-shadow:0 0 0 3px rgba(109,91,208,.14);}
  .pl-btn{
    width:100%;margin-top:8px;padding:13px;border:none;border-radius:11px;
    background:var(--pl-primario);color:#fff;font-size:15px;font-weight:600;cursor:pointer;
    transition:background .12s;
  }
  .pl-btn:hover{background:var(--pl-primario-oscuro);}
  .pl-btn:disabled{opacity:.65;cursor:default;}
  .pl-foot{margin-top:24px;font-size:12px;color:#b3b7c4;}
  .pl-foot a{color:#b3b7c4;text-decoration:none;}
  .pl-foot a:hover{color:var(--pl-primario);}
</style>
</head>
<body>
  <div class="pl-card">
    <img class="pl-logo" src="img/Podium_logo_2025.png" alt="Podium"
         onerror="this.style.display='none';document.getElementById('pl-logo-fb').style.display='block';">
    <div id="pl-logo-fb" class="pl-logo-txt" style="display:none;">podium</div>
    <p class="pl-tag">Gestión para clínicas de podología</p>

    <div id="error-msg" class="pl-error"></div>

    <form id="form-login">
      <div class="pl-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" autofocus placeholder="tu@email.com">
      </div>
      <div class="pl-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="pl-btn" id="btn-entrar">Entrar</button>
    </form>

    <div class="pl-foot"><a href="https://podium.com.ar" target="_blank" rel="noopener">podium.com.ar</a></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script>
(async () => {
  // Si ya hay sesión activa, redirigir a la app
  if (await estaLogueado()) {
    window.location.href = 'app.html';
    return;
  }
})();
const form = document.getElementById('form-login');
const errorMsg = document.getElementById('error-msg');
const btnEntrar = document.getElementById('btn-entrar');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  btnEntrar.disabled = true;
  btnEntrar.textContent = 'Ingresando...';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorMsg.textContent = 'Email o contraseña incorrectos';
    errorMsg.style.display = 'block';
    btnEntrar.disabled = false;
    btnEntrar.textContent = 'Entrar';
    return;
  }
  window.location.href = 'app.html';
});
</script>
</body>
</html>
